<div class="create-article-container">
  <form [formGroup]="createArticleForm">
    <div *ngIf="step === 1" class="create-article-step">
      <div class="writing-section">
        <div class="form-group title-group">
          <input 
            id="title" 
            formControlName="title" 
            type="text" 
            placeholder="Your Story Title..." 
            class="title-input"
          />
          <small *ngIf="createArticleForm.get('title')?.invalid && createArticleForm.get('title')?.touched" class="error">
            <i class="fas fa-exclamation-circle"></i> Title is required
          </small>
        </div>

        <div class="form-group subtitle-group">
          <input 
            id="subtitle" 
            formControlName="subtitle" 
            type="text" 
            placeholder="Add a subtitle that captures your readers..." 
            class="subtitle-input"
          />
        </div>
        
        <div class="form-group content-group">
          <app-text-editor 
            formControlName="content"
            >
          </app-text-editor>
          <small *ngIf="createArticleForm.get('content')?.invalid && createArticleForm.get('content')?.touched" class="error">
            <i class="fas fa-exclamation-circle"></i> Content is required
          </small>
        </div>
      </div>

      <div class="action-buttons">
        <button type="button" (click)="nextStep()" [disabled]="false" class="btn btn-primary">
          <i class="fas fa-arrow-right"></i> Next
        </button>
      </div>
    </div>

    <div *ngIf="step === 2" class="create-article-step">
      <div class="step-header">
        <button type="button" (click)="previousStep()" class="btn btn-back">
          <i class="fas fa-arrow-left"></i>
        </button>
        <h2>Final Touches</h2>
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" formControlName="category" class="category-select">
          <option value="">Select a category</option>
          <option *ngFor="let category of categories" [value]="category.id">
            {{ category.name }}
          </option>
        </select>
        <small *ngIf="createArticleForm.get('category')?.invalid && createArticleForm.get('category')?.touched" class="error">
          <i class="fas fa-exclamation-circle"></i> Category is required
        </small>
      </div>

      <div class="form-group tags-group">
        <label for="tags">Tags</label>
        <div class="tag-input-wrapper">
          <i class="fas fa-tags tag-icon"></i>
          <input 
            id="tags" 
            #tagInput 
            type="text" 
            placeholder="Add a tag and press Enter..." 
            class="tag-input"
            (keyup.enter)="addTag(tagInput)" 
          />
          <button type="button" (click)="addTag(tagInput)" class="btn btn-tag">
            <i class="fas fa-plus"></i>
          </button>
        </div>
        <div class="tags-container">
          <span *ngFor="let tag of tags" class="tag">
            {{ tag }}
            <button type="button" (click)="removeTag(tag)" class="tag-remove">
              <i class="fas fa-times"></i>
            </button>
          </span>
        </div>
      </div>

      <div class="publish-actions">
        <button type="submit" (click)="onSubmit(false)" class="btn btn-draft">
          <i class="fas fa-save"></i> Save Draft
        </button>
        <button type="submit" (click)="onSubmit(true)" class="btn btn-publish">
          <i class="fas fa-paper-plane"></i> Publish
        </button>
      </div>
    </div>
  </form>
</div>
