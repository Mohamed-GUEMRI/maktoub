<div class="article-card" *ngFor="let article of articles" >
  <!-- Article Header -->
  <div class="article-header">
    <div class="author-section">
      <div class="avatar-wrapper" [routerLink]="['/user/', article.authorId]">
        <img src="../../../assets/th.jpg" alt="Author avatar" class="author-avatar">
      </div>
      <div class="article-meta">
        <span class="author-name" [routerLink]="['/user/', article.authorId]">{{ authorNames[article.authorId] }}</span>
        <div class="post-info">
          <span class="article-date">{{ article.createdAt | date: 'MMM dd, yyyy' }}</span>
          <span class="separator">·</span>
          <span class="read-time">{{ getReadingTime(article.content) }} read</span>
        </div>
      </div>
    </div>
    <button class="follow-btn" *ngIf="!isTheSame[article.id]" (click)="toggleFollow(article.authorId)" [class.notfollowed]="!followingStatus[article.authorId]">
      {{ followingStatus[article.authorId] ? 'Unfollow' : 'Follow' }}
    </button>
  </div>

  <!-- Article Body -->
  <div class="article-body" [routerLink]="['/articles/', article.id]">
    <div class="article-content">
      <h2 class="article-title">{{ article.title }}</h2>
      <p class="article-description">{{ article.subtitle }}</p>
      
      <div class="article-tags">
        <span class="tag" >
          <i class="fas fa-hashtag"></i>
           {{ articleTags[article.id] }} 
        </span>
      </div>
    </div>
    
    <div class="article-image" *ngIf="false">
      <img  alt="Article image">
    </div>
  </div>

  <!-- Article Footer -->
  <div class="article-footer">
    <div class="article-stats">
      <button class="stat-btn">
        <i class="fas fa-eye"></i>
        <span>{{ article.viewCount }}</span>
      </button>
      <button class="stat-btn">
        <i class="fas fa-heart"></i>
        <span>{{ article.likeCount }}</span>
      </button>
      <button class="stat-btn">
        <i class="fas fa-comment"></i>
        <span> 0 </span>
      </button>
    </div>
    
    <div class="right-actions">
      <span class="article-category">{{ articleCategories[article.id] }}</span>
      <button class="action-btn" [class.bookmark]="isBookmarked[article.id]" (click)="addBookmark(article.id)">
        <i class="fas fa-bookmark"></i>
      </button>
      <button class="action-btn share" (click)="shareArticle(article.id,article.title)">
        <i class="fas fa-share-alt"></i>
      </button>
    </div>
  </div>
</div>
