<div class="editor-container" [class.rtl-mode]="isRTL">
  <div class="editor-toolbar">
    <select 
      [(ngModel)]="currentLanguage" 
      (change)="onLanguageChange()"
      class="language-selector"
    >
      <option value="en">English</option>
      <option value="fr">French</option>
      <option value="ar">العربية</option>
    </select>
    <button (click)="formatText('bold')" title="Bold">
      <i class="fas fa-bold"></i>
    </button>
    <button (click)="formatText('italic')" title="Italic">
      <i class="fas fa-italic"></i>
    </button>
    <button (click)="formatText('underline')" title="Underline">
      <i class="fas fa-underline"></i>
    </button>
    <button (click)="formatText('insertUnorderedList')" title="Unordered List">
      <i class="fas fa-list-ul"></i>
    </button>
    <button (click)="formatText('insertOrderedList')" title="Ordered List">
      <i class="fas fa-list-ol"></i>
    </button>
  </div>
  <div
    #editorContent
    contenteditable="true"
    class="editor-content"
    [attr.dir]="textDirection"
    [attr.lang]="currentLanguage"
    (input)="onContentChange($event)"
  ></div>
</div>
